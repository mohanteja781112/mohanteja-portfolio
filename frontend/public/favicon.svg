<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0A0F2C" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#D946EF" />
    </linearGradient>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <rect width="504" height="504" x="4" y="4" rx="116" fill="none" stroke="url(#cyanGrad)" stroke-width="4" stroke-opacity="0.3" />

  <g transform="translate(0, 4)">
    <!-- M -->
    <path d="M 96 350 L 96 160 L 166 250 L 236 160 L 236 350" fill="none" stroke="url(#cyanGrad)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)"/>
    
    <!-- T -->
    <path d="M 276 160 L 416 160 M 346 160 L 346 350" fill="none" stroke="url(#purpleGrad)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowPurple)"/>
  </g>
</svg>